server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # مقالات (SEO) — docs/PRD-articles-seo-blog.md بخش ۳. این صفحات را React نمی‌سازد؛
    # مستقیم توسط بک‌اند (NestJS) با HTML/meta/OG واقعی رندر می‌شوند، تا از همان درخواست
    # اول title/description درست داشته باشند (نه بعد از اجرای جاوااسکریپت).
    # نکته: آدرس بک‌اند اینجا از همون مقداری که در front-end/.env.production برای
    # VITE_API_URL تنظیم شده (بدون /api/v1) گرفته شده — اگر دامنه‌ی بک‌اند عوض شد، اینجا هم باید عوض شود.
    location /blog {
        proxy_pass https://api.nivoai.ir;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA routing — همه مسیرها به index.html برگردند
    location / {
        try_files $uri $uri/ /index.html;
    }

    # کش برای فایل‌های استاتیک
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
