# لاگ مفصل مخصوص دیباگ پراکسی /blog — شامل آدرس/وضعیت upstream (بک‌اند) و زمان پاسخ،
# تا در docker logs دقیق دیده شود درخواست واقعاً به بک‌اند رسیده یا نه و با چه نتیجه‌ای.
# ایمیج پایه‌ی nginx به‌صورت پیش‌فرض access.log/error.log را به stdout/stderr symlink
# می‌کند — یعنی همین‌ها بدون تنظیم اضافه با docker logs / پنل هاستینگ قابل مشاهده‌اند.
log_format blog_debug '[$time_local] "$request" status=$status '
                       'upstream=$upstream_addr upstream_status=$upstream_status '
                       'upstream_connect_time=$upstream_connect_time request_time=$request_time '
                       'upstream_error="$upstream_http_x_error" referer="$http_referer"';

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # مقالات (SEO) — docs/PRD-articles-seo-blog.md بخش ۳. این صفحات را React نمی‌سازد؛
    # مستقیم توسط بک‌اند (NestJS) با HTML/meta/OG واقعی رندر می‌شوند، تا از همان درخواست
    # اول title/description درست داشته باشند (نه بعد از اجرای جاوااسکریپت).
    #
    # تایید شد (لاگ blog_debug واقعی، ۱۲ تیر ۱۴۰۵): فرانت و بک‌اند در دو کانتینر/pod جدا
    # روی همروش (Kubernetes) اجرا می‌شوند — "localhost:3000" از داخل کانتینر nginx غیرقابل‌دسترس بود
    # (connect() failed: Connection refused). طبق راهنمای همروش، برای ارتباط بین اپ‌های یک
    # namespace باید از آدرس داخلی سرویس استفاده کرد (نه دامنه‌ی عمومی) — سریع‌تر و بدون
    # عبور از ingress/SSL خارجی.
    location /blog {
        access_log /dev/stdout blog_debug;
        error_log /dev/stderr warn;

        proxy_pass http://nivo-backend.amir-bayat-nivo.svc:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # اگر بک‌اند اصلاً جواب نداد (DNS/اتصال قطع/timeout)، به‌جای گیرکردن طولانی، سریع خطا بده
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
    }

    # SPA routing — همه مسیرها به index.html برگردند
    location / {
        try_files $uri $uri/ /index.html;
    }

    # کش برای فایل‌های استاتیک
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
