<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="bubbleGrad" x1="10" y1="20" x2="108" y2="102" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9b4dff"/>
      <stop offset="0.55" stop-color="#7e14ff"/>
      <stop offset="1" stop-color="#1fb872"/>
    </linearGradient>
    <radialGradient id="nebulaGlow" cx="0.42" cy="0.4" r="0.65">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="0.5" stop-color="#c9a8ff" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sparkGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4.2"/>
    </filter>
    <clipPath id="bubbleClip">
      <path d="M28 12h64c11 0 20 9 20 20v40c0 11-9 20-20 20H55.5L34 111.5c-2.4 2.4-6.5.7-6.5-2.7V92H28c-11 0-20-9-20-20V32c0-11 9-20 20-20z"/>
    </clipPath>
  </defs>

  <!-- bubble base -->
  <path fill="url(#bubbleGrad)" d="M28 12h64c11 0 20 9 20 20v40c0 11-9 20-20 20H55.5L34 111.5c-2.4 2.4-6.5.7-6.5-2.7V92H28c-11 0-20-9-20-20V32c0-11 9-20 20-20z"/>

  <g clip-path="url(#bubbleClip)">
    <!-- nebula depth glow -->
    <rect x="0" y="0" width="120" height="120" fill="url(#nebulaGlow)"/>

    <!-- scattered stars -->
    <circle cx="24" cy="30" r="1.6" fill="#ffffff" opacity="0.85"/>
    <circle cx="90" cy="24" r="1.3" fill="#ffffff" opacity="0.6"/>
    <circle cx="97" cy="58" r="1.8" fill="#ffffff" opacity="0.7"/>
    <circle cx="20" cy="66" r="1.2" fill="#ffffff" opacity="0.55"/>
    <circle cx="80" cy="78" r="1.4" fill="#eafff5" opacity="0.65"/>
    <circle cx="40" cy="20" r="1" fill="#ffffff" opacity="0.5"/>

    <!-- orbit ring with moon -->
    <ellipse cx="61" cy="52" rx="30" ry="12" transform="rotate(-18 61 52)" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="1.6"/>
    <circle cx="87.5" cy="41" r="3.2" fill="#baffde"/>
    <circle cx="87.5" cy="41" r="5.5" fill="#baffde" opacity="0.35"/>

    <!-- spark glow halo -->
    <circle cx="61" cy="52" r="24" fill="url(#sparkGlow)" filter="url(#softBlur)"/>

    <!-- main AI spark -->
    <path fill="#ffffff" d="M62 30c1.8 14 5.4 20.2 19.6 23.4C67.4 56.8 63.8 63 62 77c-1.8-14-5.4-20.2-19.6-23.4C56.6 50.2 60.2 44 62 30z"/>
    <!-- small twinkle spark -->
    <path fill="#ffffff" opacity="0.9" d="M85 66c0.7 5.4 2 7.6 7.2 8.8-5.2 1.2-6.5 3.4-7.2 8.8-0.7-5.4-2-7.6-7.2-8.8 5.2-1.2 6.5-3.4 7.2-8.8z"/>
  </g>
</svg>
